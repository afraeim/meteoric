name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  windows-installer:
    name: Build Windows NSIS installer (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install stable Rust toolchain
        run: rustup toolchain install stable --no-self-update

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bun run build:frontend

      - name: Build Windows installer (NSIS)
        run: bun x tauri build --bundles nsis

      - name: Upload Windows .exe installer artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: meteoric-windows-exe-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
