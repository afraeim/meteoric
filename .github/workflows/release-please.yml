name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Open or update release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071  # v4.4.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-cargo-lock:
    name: Sync Cargo.lock into release PR
    needs: release-please
    # Runs when release-please opened/updated a PR but has not yet created a release
    if: ${{ !needs.release-please.outputs.release_created && needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}

      - name: Install stable Rust toolchain
        run: rustup toolchain install stable --no-self-update

      - name: Update Cargo.lock for meteoric package
        working-directory: src-tauri
        run: cargo update --package meteoric

      - name: Commit Cargo.lock if it changed
        run: |
          if ! git diff --quiet src-tauri/Cargo.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src-tauri/Cargo.lock
            git commit -m "chore: sync Cargo.lock to version bump"
            git push
          else
            echo "Cargo.lock already in sync, nothing to commit"
          fi

  build-and-release:
    name: Build and publish macOS app
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install stable Rust toolchain
        run: rustup toolchain install stable --no-self-update

      - name: Install nightly Rust toolchain
        run: rustup toolchain install nightly-2026-03-30 --component llvm-tools --no-self-update

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@eea29cff9a2b68892c0845ae3e4f45fc47ee9354  # v2.75.13
        with:
          tool: cargo-llvm-cov

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bun run lint && bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Run all tests with coverage enforcement
        run: bun run test:all:coverage

      - name: Build frontend
        run: bun run build:frontend

      - name: Build Tauri app
        run: bun run build:backend

      - name: Ad-hoc sign the app
        run: |
          codesign --deep --force --sign - src-tauri/target/release/bundle/macos/Meteoric.app
          codesign --verify --verbose src-tauri/target/release/bundle/macos/Meteoric.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG installer
        run: |
          # Stage only the .app — exclude any leftover build artifacts
          # (e.g. Meteoric.app.tar.gz) from the bundle directory.
          mkdir -p /tmp/meteoric-dmg-src
          cp -r src-tauri/target/release/bundle/macos/Meteoric.app /tmp/meteoric-dmg-src/

          mkdir -p src-tauri/target/release/bundle/dmg
          create-dmg \
            --volname "Meteoric" \
            --background "src-tauri/assets/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 128 \
            --icon "Meteoric.app" 170 170 \
            --hide-extension "Meteoric.app" \
            --app-drop-link 430 170 \
            "src-tauri/target/release/bundle/dmg/Meteoric.dmg" \
            "/tmp/meteoric-dmg-src"

          rm -rf /tmp/meteoric-dmg-src

      - name: Generate release checksums
        run: |
          cd src-tauri/target/release/bundle
          shasum -a 256 macos/*.app.tar.gz dmg/*.dmg > checksums.txt

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            src-tauri/target/release/bundle/macos/Meteoric.app.tar.gz \
            src-tauri/target/release/bundle/dmg/Meteoric.dmg \
            src-tauri/target/release/bundle/checksums.txt

  build-and-release-windows:
    name: Build and publish Windows installers
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install stable Rust toolchain
        run: rustup toolchain install stable --no-self-update

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bun run build:frontend

      - name: Build Windows installers (MSI + NSIS)
        run: bun run build:backend:windows

      - name: Generate Windows release checksums
        shell: pwsh
        run: |
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue
          $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue

          if (-not $msi -or -not $nsis) {
            Write-Error "Expected MSI and NSIS installer artifacts were not found."
            exit 1
          }

          $checksumPath = "src-tauri/target/release/bundle/windows-checksums.txt"
          Remove-Item $checksumPath -ErrorAction SilentlyContinue

          foreach ($f in @($msi + $nsis)) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($f.Name)" | Out-File -FilePath $checksumPath -Append -Encoding ascii
          }

      - name: Upload Windows release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $msiFiles = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi"
          $nsisFiles = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe"

          foreach ($f in @($msiFiles + $nsisFiles)) {
            gh release upload $tag $f.FullName --clobber
          }

          gh release upload $tag "src-tauri/target/release/bundle/windows-checksums.txt" --clobber
